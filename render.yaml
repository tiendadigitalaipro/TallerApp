services:
  - type: web
    name: tallerapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false  # Postgres de Supabase — se pega el valor real en el dashboard de Render, nunca en el repo
