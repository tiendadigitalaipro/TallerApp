services:
  - type: web
    name: tallerapp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        value: change-this-in-production
      - key: DATABASE_URL
        value: sqlite:///./tallerapp.db
