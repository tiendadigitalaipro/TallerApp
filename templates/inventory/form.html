{% extends "base.html" %}
{% block title %}{{ 'Editar' if part else 'Nuevo' }} Repuesto - TallerApp{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Editar' if part else 'Nuevo' }} Repuesto</h1>
    <form method="POST" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Código *</label><input type="text" name="code" required value="{{ part.code if part else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label><input type="text" name="name" required value="{{ part.name if part else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Categoría</label>
                <select name="category" class="w-full px-3 py-2 border rounded-lg">{% for c in categories %}<option value="{{ c.value }}" {% if part and part.category == c %}selected{% endif %}>{{ c.value }}</option>{% endfor %}</select></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Ubicación</label><input type="text" name="location" value="{{ part.location if part else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Stock Actual</label><input type="number" name="stock" value="{{ part.stock if part else 0 }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Stock Mínimo</label><input type="number" name="min_stock" value="{{ part.min_stock if part else 5 }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Costo de Compra</label><input type="number" step="0.01" name="cost_price" value="{{ part.cost_price if part else 0 }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Precio de Venta</label><input type="number" step="0.01" name="sale_price" value="{{ part.sale_price if part else 0 }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Proveedor</label>
                <select name="supplier_id" class="w-full px-3 py-2 border rounded-lg"><option value="">Sin proveedor</option>{% for s in suppliers %}<option value="{{ s.id }}" {% if part and part.supplier_id == s.id %}selected{% endif %}>{{ s.name }}</option>{% endfor %}</select></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label><textarea name="description" rows="2" class="w-full px-3 py-2 border rounded-lg">{{ part.description if part else '' }}</textarea></div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800">Guardar</button>
            <a href="/inventario" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
