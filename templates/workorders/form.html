{% extends "base.html" %}
{% block title %}Nueva Orden de Trabajo - TallerApp{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Nueva Orden de Trabajo</h1>
    <form method="POST" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Cliente *</label>
                <select name="client_id" required id="client-select" class="w-full px-3 py-2 border rounded-lg" onchange="fetchEquipos(this.value)">
                    <option value="">Seleccionar...</option>
                    {% for c in clients %}<option value="{{ c.id }}" {% if selected_client_id == c.id %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Equipo *</label>
                <select name="equipment_id" required class="w-full px-3 py-2 border rounded-lg">
                    <option value="">Seleccionar equipo...</option>
                    {% for eq in equipment %}<option value="{{ eq.id }}" data-client="{{ eq.client_id }}" {% if selected_equip_id == eq.id %}selected{% endif %}>{{ eq.brand or '?' }} {{ eq.model or '' }} - {{ eq.equipment_type.value }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Técnico Responsable</label>
                <select name="technician_id" class="w-full px-3 py-2 border rounded-lg">
                    <option value="">Sin asignar</option>
                    {% for t in technicians %}<option value="{{ t.id }}">{{ t.full_name }}</option>{% endfor %}
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Estimada de Entrega</label>
                <input type="date" name="estimated_end_date" value="{{ today }}" class="w-full px-3 py-2 border rounded-lg">
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Diagnóstico</label>
            <textarea name="diagnosis" rows="3" class="w-full px-3 py-2 border rounded-lg"></textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Tarifa por Hora (Mano de Obra)</label>
            <input type="number" step="0.01" name="labor_rate" value="0" class="w-full px-3 py-2 border rounded-lg">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas Internas</label>
            <textarea name="internal_notes" rows="2" class="w-full px-3 py-2 border rounded-lg"></textarea>
        </div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800">Crear Orden</button>
            <a href="/ordenes" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">Cancelar</a>
        </div>
    </form>
</div>
<script>
function fetchEquipos(clientId) {
    // Simple filter for equipment dropdown
    const select = document.querySelector('select[name="equipment_id"]');
    for (const opt of select.options) {
        if (opt.value === '') continue;
        opt.style.display = opt.dataset.client && (opt.dataset.client === String(clientId) || !clientId) ? '' : 'none';
    }
}
document.addEventListener('DOMContentLoaded', function() {
    const sel = document.getElementById('client-select');
    if (sel.value) fetchEquipos(sel.value);
});
</script>
{% endblock %}
