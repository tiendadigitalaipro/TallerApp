{% extends "base.html" %}
{% block title %}Usuarios - TallerApp{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Usuarios del Sistema</h1>
    <button onclick="showModal()" class="bg-blue-900 text-white px-4 py-2 rounded-lg hover:bg-blue-800">+ Nuevo Usuario</button>
</div>
<div class="bg-white rounded-lg shadow overflow-hidden">
    <table class="w-full">
        <thead class="bg-gray-50"><tr><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase text-left">Usuario</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase text-left">Nombre</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase text-left">Email</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase text-center">Rol</th><th class="px-4 py-3 text-xs font-medium text-gray-500 uppercase text-center">Activo</th><th class="px-4 py-3"></th></tr></thead>
        <tbody class="divide-y divide-gray-200">
            {% for u in users %}
            <tr class="hover:bg-gray-50">
                <td class="px-4 py-3 font-medium">{{ u.username }}</td>
                <td class="px-4 py-3 text-sm">{{ u.full_name }}</td>
                <td class="px-4 py-3 text-sm">{{ u.email or '-' }}</td>
                <td class="px-4 py-3 text-center"><span class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">{{ u.role.value }}</span></td>
                <td class="px-4 py-3 text-center">
                    <form method="POST" action="/usuarios/{{ u.id }}/toggle">
                        <button type="submit" class="px-3 py-1 text-xs rounded-full {% if u.active %}bg-green-100 text-green-800 hover:bg-red-100 hover:text-red-800{% else %}bg-red-100 text-red-800 hover:bg-green-100 hover:text-green-800{% endif %}">
                            {{ 'Activo' if u.active else 'Inactivo' }}
                        </button>
                    </form>
                </td>
                <td class="px-4 py-3"></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div id="user-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center">
    <div class="bg-white rounded-lg p-6 w-full max-w-md">
        <h3 class="font-semibold text-gray-700 mb-4">Nuevo Usuario</h3>
        <form method="POST" action="/usuarios/nuevo" class="space-y-3">
            <input type="text" name="username" placeholder="Nombre de usuario *" required class="w-full px-3 py-2 border rounded-lg">
            <input type="text" name="full_name" placeholder="Nombre completo *" required class="w-full px-3 py-2 border rounded-lg">
            <input type="email" name="email" placeholder="Email" class="w-full px-3 py-2 border rounded-lg">
            <input type="text" name="phone" placeholder="Teléfono" class="w-full px-3 py-2 border rounded-lg">
            <input type="password" name="password" placeholder="Contraseña (default: 123456)" class="w-full px-3 py-2 border rounded-lg">
            <select name="role" class="w-full px-3 py-2 border rounded-lg">
                {% for r in roles %}<option value="{{ r.value }}">{{ r.value }}</option>{% endfor %}
            </select>
            <div class="flex gap-2 pt-2">
                <button type="submit" class="bg-blue-900 text-white px-4 py-2 rounded-lg">Crear</button>
                <button type="button" onclick="hideModal()" class="bg-gray-300 px-4 py-2 rounded-lg">Cancelar</button>
            </div>
        </form>
    </div>
</div>
<script>
function showModal() { document.getElementById('user-modal').classList.remove('hidden'); document.getElementById('user-modal').classList.add('flex'); }
function hideModal() { document.getElementById('user-modal').classList.add('hidden'); document.getElementById('user-modal').classList.remove('flex'); }
</script>
{% endblock %}
