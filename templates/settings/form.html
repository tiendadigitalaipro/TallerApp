{% extends "base.html" %}
{% block title %}Configuración - TallerApp{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Configuración del Taller</h1>
    <form method="POST" class="bg-white rounded-lg shadow p-6 space-y-4">
        <h3 class="font-semibold text-gray-700 border-b pb-2">Información del Taller</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Nombre del Taller</label><input type="text" name="shop_name" value="{{ settings.shop_name if settings else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label><input type="text" name="phone" value="{{ settings.phone if settings else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Email</label><input type="email" name="email" value="{{ settings.email if settings else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Sitio Web</label><input type="text" name="website" value="{{ settings.website if settings else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label><textarea name="address" rows="2" class="w-full px-3 py-2 border rounded-lg">{{ settings.address if settings else '' }}</textarea></div>
        <h3 class="font-semibold text-gray-700 border-b pb-2 mt-4">Facturación</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prefijo Factura</label><input type="text" name="invoice_prefix" value="{{ settings.invoice_prefix if settings else 'FAC-' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prefijo Presupuesto</label><input type="text" name="estimate_prefix" value="{{ settings.estimate_prefix if settings else 'PRE-' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Prefijo OT</label><input type="text" name="order_prefix" value="{{ settings.order_prefix if settings else 'OT-' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">IVA (%)</label><input type="number" step="0.1" name="tax_rate" value="{{ settings.tax_rate if settings else 16 }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Moneda</label><input type="text" name="currency" value="{{ settings.currency if settings else 'Bs' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Tarifa Hora (M.O.)</label><input type="number" step="0.01" name="labor_rate" value="{{ settings.labor_rate if settings else 0 }}" class="w-full px-3 py-2 border rounded-lg"></div>
        </div>
        <h3 class="font-semibold text-gray-700 border-b pb-2 mt-4">Redes Sociales</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Instagram</label><input type="text" name="instagram" value="{{ settings.social_media.instagram if settings and settings.social_media else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Facebook</label><input type="text" name="facebook" value="{{ settings.social_media.facebook if settings and settings.social_media else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">WhatsApp (Número)</label><input type="text" name="whatsapp_number" value="{{ settings.whatsapp_number if settings else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
        </div>
        <div class="pt-4"><button type="submit" class="bg-blue-900 text-white px-8 py-3 rounded-lg hover:bg-blue-800">Guardar Configuración</button></div>
    </form>
</div>
{% endblock %}
