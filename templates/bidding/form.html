{% extends "base.html" %}
{% block title %}{{ 'Editar' if bid else 'Nueva' }} Licitación - TallerApp{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Editar' if bid else 'Nueva' }} Licitación</h1>
    <form method="POST" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="md:col-span-2"><label class="block text-sm font-medium text-gray-700 mb-1">Título *</label><input type="text" name="title" required value="{{ bid.title if bid else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Institución</label><input type="text" name="institution" value="{{ bid.institution if bid else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Referencia</label><input type="text" name="reference" value="{{ bid.reference if bid else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Valor Estimado</label><input type="number" step="0.01" name="estimated_value" value="{{ bid.estimated_value if bid else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Valor Propuesto</label><input type="number" step="0.01" name="proposed_value" value="{{ bid.proposed_value if bid else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Cierre</label><input type="date" name="deadline" value="{{ bid.deadline.strftime('%Y-%m-%d') if bid and bid.deadline else today }}" class="w-full px-3 py-2 border rounded-lg"></div>
            <div><label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Presentación</label><input type="date" name="submission_date" value="{{ bid.submission_date.strftime('%Y-%m-%d') if bid and bid.submission_date else '' }}" class="w-full px-3 py-2 border rounded-lg"></div>
        </div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Descripción</label><textarea name="description" rows="3" class="w-full px-3 py-2 border rounded-lg">{{ bid.description if bid else '' }}</textarea></div>
        <div><label class="block text-sm font-medium text-gray-700 mb-1">Notas</label><textarea name="notes" rows="2" class="w-full px-3 py-2 border rounded-lg">{{ bid.notes if bid else '' }}</textarea></div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800">Guardar</button>
            <a href="/licitaciones" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
