<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — TallerApp</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <style>
        .login-card {
            animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-focus:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.15);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-[#1e3a5f] to-[#0f2440] flex items-center justify-center p-4 font-sans antialiased">

    <div class="login-card w-full max-w-md">
        <!-- Branding -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white/10 rounded-full mb-4">
                <span class="text-4xl">🛠️</span>
            </div>
            <h1 class="text-3xl font-bold text-white tracking-tight">TallerApp</h1>
            <p class="text-white/60 mt-1 text-sm">Sistema de Gestión de Taller Mecánico</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-xl font-semibold text-[#1f2937] text-center mb-6">Iniciar Sesión</h2>

            <!-- Error message -->
            {% if error %}
            <div class="mb-5 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3"
                 x-data="{ show: true }"
                 x-show="show"
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-2">
                <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <div class="flex-1">
                    <p class="text-sm font-medium text-red-800">{{ error }}</p>
                </div>
                <button @click="show = false" class="text-red-400 hover:text-red-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            {% endif %}

            <!-- Error via URL param ?error=1 (fallback) -->
            <div id="url-error"
                 class="hidden mb-5 p-4 bg-red-50 border border-red-200 rounded-lg flex items-start gap-3"
                 x-data="{ show: false }"
                 x-show="show"
                 x-init="
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('error') == '1') show = true;
                 "
                 x-transition:enter="transition ease-out duration-200"
                 x-transition:enter-start="opacity-0 -translate-y-2"
                 x-transition:enter-end="opacity-100 translate-y-0"
                 x-transition:leave="transition ease-in duration-150"
                 x-transition:leave-start="opacity-100 translate-y-0"
                 x-transition:leave-end="opacity-0 -translate-y-2">
                <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <div class="flex-1">
                    <p class="text-sm font-medium text-red-800">Usuario o contraseña incorrectos. Intente nuevamente.</p>
                </div>
                <button @click="show = false" class="text-red-400 hover:text-red-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Login Form -->
            <form action="/api/login" method="POST" class="space-y-5">
                <!-- CSRF token placeholder (if needed) -->
                {% if csrf_token is defined %}
                <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                {% endif %}

                <!-- Username -->
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1.5">Usuario</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                        </div>
                        <input type="text" id="username" name="username" required autocomplete="username"
                               autocapitalize="off" autocorrect="off" spellcheck="false"
                               placeholder="Ingrese su usuario"
                               class="input-focus w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm text-[#1f2937] placeholder-gray-400 focus:outline-none transition-colors">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1.5">Contraseña</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               placeholder="Ingrese su contraseña"
                               class="input-focus w-full pl-10 pr-4 py-2.5 border border-gray-300 rounded-lg text-sm text-[#1f2937] placeholder-gray-400 focus:outline-none transition-colors">
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-2.5 px-4 bg-[#1e3a5f] hover:bg-[#162d4a] text-white font-semibold rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-[#f59e0b] focus:ring-offset-2">
                    Ingresar
                </button>
            </form>

            <!-- Footer -->
            <p class="mt-6 text-xs text-center text-gray-400">
                &copy; {{ now().year if now is defined else '' }} TallerApp &mdash; Todos los derechos reservados
            </p>
        </div>
    </div>

</body>
</html>
