{% extends "base.html" %}
{% block title %}{{ 'Editar' if client else 'Nuevo' }} Cliente - TallerApp{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">{{ 'Editar' if client else 'Nuevo' }} Cliente</h1>
    <form method="POST" class="bg-white rounded-lg shadow p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre *</label>
                <input type="text" name="name" required value="{{ client.name if client else '' }}"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-900">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                <input type="text" name="phone" value="{{ client.phone if client else '' }}"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-900">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" value="{{ client.email if client else '' }}"
                       class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-blue-900">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Preferencia de Contacto</label>
                <select name="contact_preference" class="w-full px-3 py-2 border rounded-lg">
                    <option value="WhatsApp" {% if client and client.contact_preference == 'WhatsApp' %}selected{% endif %}>WhatsApp</option>
                    <option value="Email" {% if client and client.contact_preference == 'Email' %}selected{% endif %}>Email</option>
                    <option value="Llamada" {% if client and client.contact_preference == 'Llamada' %}selected{% endif %}>Llamada</option>
                </select>
            </div>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
            <textarea name="address" rows="2" class="w-full px-3 py-2 border rounded-lg">{{ client.address if client else '' }}</textarea>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Notas</label>
            <textarea name="notes" rows="3" class="w-full px-3 py-2 border rounded-lg">{{ client.notes if client else '' }}</textarea>
        </div>
        {% if not client %}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Nota inicial (interacción)</label>
            <textarea name="initial_notes" rows="2" class="w-full px-3 py-2 border rounded-lg" placeholder="Opcional - primera interacción con este cliente"></textarea>
        </div>
        {% endif %}
        <div class="flex gap-3 pt-4">
            <button type="submit" class="bg-blue-900 text-white px-6 py-2 rounded-lg hover:bg-blue-800">Guardar</button>
            <a href="/clientes" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
